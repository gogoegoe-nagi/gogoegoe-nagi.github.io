<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>あなたの凪に繋がる今日の言葉</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;600&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-color: #f0f0f0; 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.2); 
    z-index: -1;
  }

  .card {
    background-color: rgba(255, 255, 255, 0.88); 
    backdrop-filter: blur(10px);
    padding: 50px 40px;
    border-radius: 24px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    max-width: 450px;
    width: 85%;
    text-align: center;
    z-index: 1;
  }

  .sub-title {
    font-size: 0.9em;
    font-weight: normal;
    color: #888;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
  }

  .date {
    font-size: 1.0em;
    margin-bottom: 30px;
    color: #888;
    line-height: 1.2;
    letter-spacing: 0.1em;
  }

  .quote {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.6em;
    font-weight: 300;
    color: #444;
    line-height: 2.0;
    word-break: break-all;
    padding: 0 10px;
  }

  .footer-credit {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 10;
  }

  .footer-link {
    text-decoration: none;
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.8em;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  .footer-link:hover {
    color: #fff;
    opacity: 1;
  }
</style>
</head>
<body>

<div class="card">
  <div class="sub-title">〜 あなたの凪に繋がる今日の言葉 〜</div>
  <div class="date" id="dateDisplay">--月--日</div>
  <div class="quote" id="quoteDisplay">名言がここに表示されます</div>
</div>

<div class="footer-credit">
  <a href="https://note.com/lacrea_daisuke" target="_blank" rel="noopener noreferrer" class="footer-link">
    Words & Photos by Daisuke(Link:Note)
  </a>
</div>

<script>
  const quotes = [
    "今、感謝を伝えたい人は？どんな感謝を伝えたい？",
    "あなたに心地良さをもたらすモノは？",
    "目の前に「魔法の手帳」があります。ここに書いたことはこの人生で全て経験できるとしたら、この手帳に何を書きますか？",
    "もし全てがリセットされたとしたら、これから何をしたい？",
    "もし10年後の幸せなあなたからのメッセージがあるとしたら、どんな内容？",
    "もし何をしても上手くいくとしたら、何をしたい？",
    "今の生活で、モヤモヤすることは？　その裏にはどんな願いや望みがあるの？",
    "もし今の経験を持ったまま学生に戻るとしたら、そこからどう生きる？",
    "あなたの心がさらに凪いだとき、それはどんな感覚？目を閉じて感じてみて",
    "最近、美しいと感じたことは？ そのどこに魂が惹かれた？",
    "さらに軽やかに生きるため、よりフォーカスしたいことは？",
    "あなたの心地よさのために、今、手放したいことは？",
    "これからどんな人生になったら、より楽しそう？",
    "もし突拍子もないことがあっさりと実現するとしたら、何が実現したら魂が喜ぶ？",
    "魔法でなんでも変えられるとしたら、何を変えたい？",
    "あと１年しかないとしたら、どうしたい？",
    "日常からどんな時間を減らすと、さらに心地良くなるだろう？",
    "あなたが惹かれる人は？その人のどんな部分に惹かれる？",
    "これから始まる素敵な1日に「映画」のようなタイトルをつけるとしたら？",
    "あなたをサポートしている「大いなる存在」からメッセージがあります。そのメッセージの内容は？",
    "少し休憩して、整えたいことは？",
    "一瞬で別のパラレルワールドに移行できるとしたら、どんなパラレルワールドに移りたい？",
    "目の前に今のあなたと同じ境遇の人がいます。なんて声をかける？",
  ];

  function updateDate() {
    const today = new Date();
    const month = today.getMonth() + 1;
    const date = today.getDate();
    document.getElementById('dateDisplay').textContent = `${month}月${date}日`;
  }

  function updateQuote() {
    const today = new Date();
    const day = today.getDate();
    const index = (day - 1) % quotes.length;
    document.getElementById('quoteDisplay').textContent = quotes[index];
  }

  function updateBackground() {
    // 画像の拡張子が .jpeg であることを確認してください。
    // もし .jpg であればここを修正します。
    const images = [
      "image2.jpeg", "image3.jpeg", "image4.jpeg",
      "image6.jpeg", "image7.jpeg", "image8.jpeg",
      "image9.jpeg", "image10.jpeg"
    ];
    const selectedImage = images[Math.floor(Math.random() * images.length)];
    document.body.style.backgroundImage = `url('./${selectedImage}')`;
  }

  function init() {
    updateDate();
    updateQuote();
    updateBackground();
  }

  window.onload = init;
</script>

</body>
</html>
